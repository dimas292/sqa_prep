<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQA Learn — Software Quality Assurance</title>
<meta name="description" content="Platform belajar Software Quality Assurance interaktif dengan materi ITSM, Request Management, Service Desk, dan quiz evaluasi mandiri.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lexend:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light Theme */
    --bg:       #f5f6fa;
    --bg2:      #ffffff;
    --bg3:      #f0f1f7;
    --bg4:      #e8eaf4;
    --surface:  #eceef8;
    --border:   rgba(90, 80, 200, 0.10);
    --border-h: rgba(90, 80, 200, 0.22);

    --accent:   #5b4cdb;
    --accent2:  #7c6ef0;
    --accent3:  #9d91f5;
    --accent-bg: rgba(91, 76, 219, 0.08);

    --teal:     #0aab7c;
    --teal-bg:  rgba(10, 171, 124, 0.08);
    --coral:    #e8404a;
    --coral-bg: rgba(232, 64, 74, 0.08);
    --gold:     #c47a00;
    --gold-bg:  rgba(196, 122, 0, 0.09);
    --sky:      #2a7ee8;
    --sky-bg:   rgba(42, 126, 232, 0.09);

    --text:     #1a1835;
    --text2:    #4a4670;
    --text3:    #8a87ac;

    --font-head: 'Lexend', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --r: 10px;
    --r2: 16px;
    --shadow: 0 1px 3px rgba(91,76,219,.06), 0 4px 12px rgba(91,76,219,.06);
    --shadow-lg: 0 4px 24px rgba(91,76,219,.1), 0 1px 4px rgba(91,76,219,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15.5px;
    line-height: 1.8;
    letter-spacing: 0.01em;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── LAYOUT ── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 272px;
    min-width: 272px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    box-shadow: 2px 0 12px rgba(91,76,219,.05);
  }
  .main { flex: 1; overflow-x: hidden; background: var(--bg); }

  /* ── SIDEBAR ── */
  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #5b4cdb 0%, #7c6ef0 100%);
  }
  .logo-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    padding: 3px 9px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .logo p {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 3px;
  }
  .nav-section { padding: 14px 12px 6px; }
  .nav-section-title {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    padding: 0 8px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .cat-group { margin-bottom: 4px; }
  .cat-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--r);
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    transition: all .18s;
  }
  .cat-btn:hover { background: var(--bg3); color: var(--text); }
  .cat-btn.active { background: var(--accent-bg); color: var(--accent); }
  .cat-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .cat-chevron {
    margin-left: auto;
    font-size: 10px;
    transition: transform .18s;
    color: var(--text3);
  }
  .cat-btn.open .cat-chevron { transform: rotate(90deg); }
  .parts-list {
    display: none;
    padding: 2px 0 4px 46px;
  }
  .parts-list.open { display: block; }
  .part-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    padding: 5px 10px;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 12.5px;
    color: var(--text3);
    transition: all .15s;
    line-height: 1.4;
  }
  .part-btn:hover { color: var(--text2); background: var(--bg3); }
  .part-btn.active { color: var(--accent); font-weight: 600; background: var(--accent-bg); }
  .sidebar-footer {
    margin-top: auto;
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    border-radius: 4px;
    transition: width .4s ease;
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    font-weight: 500;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 36px 44px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    box-shadow: var(--shadow);
  }
  .breadcrumb {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .breadcrumb .sep { color: var(--border-h); }
  .breadcrumb span.hi { color: var(--accent); }
  .page-header h2 {
    font-family: var(--font-head);
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
    max-width: 680px;
  }
  .page-header .meta {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .tag-level { background: var(--gold-bg); color: var(--gold); border: 1px solid rgba(196,122,0,0.15); }
  .tag-time  { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(10,171,124,0.15); }
  .tag-cat   { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(91,76,219,0.15); }

  /* ── CONTENT ── */
  .content-area { padding: 32px 44px 64px; max-width: 820px; }

  /* ── PART HEADER ── */
  .part-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .part-num {
    font-family: var(--font-head);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    border: 1px solid rgba(91,76,219,.15);
  }
  .part-title {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── SECTION LABEL ── */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .section-label-icon.materi { background: var(--sky-bg); }
  .section-label-icon.soal   { background: var(--accent-bg); }
  .section-label-icon.kunci  { background: var(--teal-bg); }
  .section-label h3 {
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .section-label p { font-size: 12px; color: var(--text3); }

  /* ── MATERIAL CARD ── */
  .material-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 30px 34px;
    margin-bottom: 8px;
    line-height: 1.95;
    color: var(--text2);
    font-size: 15px;
    letter-spacing: 0.012em;
    box-shadow: var(--shadow);
  }
  .material-card p { margin-bottom: 14px; }
  .material-card p:last-child { margin-bottom: 0; }
  .material-card ul, .material-card ol {
    padding-left: 24px;
    margin: 12px 0;
  }
  .material-card ul li, .material-card ol li { margin-bottom: 8px; line-height: 1.85; }
  .material-card strong { color: var(--text); font-weight: 600; }
  .material-card h3 {
    font-family: var(--font-head);
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
    letter-spacing: -0.01em;
  }
  .material-card h3:first-child { margin-top: 0; }
  .material-card h4 {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin: 18px 0 10px;
    letter-spacing: -0.005em;
  }
  .material-card table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin: 16px 0;
  }
  .material-card th {
    background: var(--bg3);
    color: var(--text);
    font-weight: 700;
    padding: 9px 12px;
    text-align: left;
    border: 1px solid var(--border);
    font-size: 12.5px;
  }
  .material-card td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    color: var(--text2);
    vertical-align: top;
  }
  .material-card tr:nth-child(even) td { background: var(--bg); }
  .material-card code {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 1px 6px;
    border-radius: 4px;
  }
  .material-card blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    padding: 12px 16px;
    margin: 14px 0;
    border-radius: 0 8px 8px 0;
    font-size: 13.5px;
  }
  .material-card hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── HIGHLIGHT / TERM ── */
  .term {
    display: inline;
    background: var(--accent-bg);
    border-bottom: 1.5px solid var(--accent2);
    color: var(--accent);
    padding: 1px 3px;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    transition: background .15s;
  }
  .term:hover { background: rgba(91,76,219,.16); }
  .term[data-type="process"] {
    background: var(--teal-bg);
    border-bottom-color: var(--teal);
    color: var(--teal);
  }
  .term[data-type="tool"] {
    background: var(--sky-bg);
    border-bottom-color: var(--sky);
    color: var(--sky);
  }
  .term[data-type="metric"] {
    background: var(--gold-bg);
    border-bottom-color: var(--gold);
    color: var(--gold);
  }
  .term[data-type="error"] {
    background: var(--coral-bg);
    border-bottom-color: var(--coral);
    color: var(--coral);
  }

  /* ── TOOLTIP ── */
  .tooltip-box {
    position: fixed;
    z-index: 1000;
    background: var(--bg2);
    border: 1px solid var(--border-h);
    border-radius: var(--r2);
    padding: 14px 18px;
    max-width: 300px;
    min-width: 210px;
    box-shadow: var(--shadow-lg);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .2s, transform .2s;
  }
  .tooltip-box.show { opacity: 1; transform: translateY(0); }
  .tooltip-label {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tooltip-label.concept { color: var(--accent2); }
  .tooltip-label.process { color: var(--teal); }
  .tooltip-label.tool    { color: var(--sky); }
  .tooltip-label.metric  { color: var(--gold); }
  .tooltip-label.error   { color: var(--coral); }
  .tooltip-term {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    font-family: var(--font-head);
  }
  .tooltip-def { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── LEGEND ── */
  .legend-bar {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    padding: 12px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--text3);
    align-items: center;
    box-shadow: var(--shadow);
  }
  .legend-bar strong { color: var(--text2); font-size: 11.5px; margin-right: 4px; font-weight: 700; }
  .legend-dot { display: inline-flex; align-items: center; gap: 5px; cursor: default; font-weight: 500; }
  .ld { width: 8px; height: 8px; border-radius: 50%; }

  /* ── SOAL SECTION ── */
  .soal-section { margin-top: 8px; }

  /* ── SOAL TYPE BADGE ── */
  .soal-type-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 24px 0 14px;
  }
  .soal-type-badge {
    font-family: var(--font-head);
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .soal-type-badge.pg { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(91,76,219,.15); }
  .soal-type-badge.esai { background: var(--sky-bg); color: var(--sky); border: 1px solid rgba(42,126,232,.15); }
  .soal-type-title { font-family: var(--font-head); font-size: 13.5px; font-weight: 700; color: var(--text); }

  /* ── QUIZ CARD ── */
  .quiz-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r2);
    padding: 22px 26px;
    margin-bottom: 12px;
    transition: border-color .2s, box-shadow .2s;
    box-shadow: var(--shadow);
  }
  .quiz-card.answered { border-color: var(--border-h); }
  .quiz-q {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.7;
  }
  .quiz-q .q-num {
    display: inline-block;
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--accent);
    background: var(--accent-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: 2px;
  }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    cursor: pointer;
    text-align: left;
    color: var(--text2);
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height: 1.65;
    transition: all .15s;
    font-weight: 400;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent2); background: var(--accent-bg); color: var(--text); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: var(--teal-bg); border-color: rgba(10,171,124,.35); color: var(--teal); }
  .option-btn.wrong   { background: var(--coral-bg); border-color: rgba(232,64,74,.3); color: var(--coral); }
  .opt-circle {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10.5px;
    font-weight: 700;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .quiz-feedback {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--r);
    font-size: 14px;
    display: none;
    line-height: 1.7;
    font-weight: 500;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: var(--teal-bg); border: 1px solid rgba(10,171,124,.2); color: var(--teal); }
  .quiz-feedback.no { background: var(--coral-bg); border: 1px solid rgba(232,64,74,.18); color: var(--coral); }

  /* ── ESAI SOAL ── */
  .esai-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--sky);
    border-radius: var(--r2);
    padding: 20px 24px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .esai-num {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--sky);
    background: var(--sky-bg);
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 8px;
    text-transform: uppercase;
  }
  .esai-q { font-size: 14.5px; color: var(--text); line-height: 1.75; font-weight: 500; }

  /* ── KUNCI SECTION ── */
  .kunci-section {
    margin-top: 8px;
  }
  .kunci-card {
    background: linear-gradient(135deg, #f0fff8 0%, #f5f9ff 100%);
    border: 1px solid rgba(10,171,124,.18);
    border-radius: var(--r2);
    padding: 24px 28px;
    box-shadow: var(--shadow);
  }
  .kunci-card h4 {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    color: var(--teal);
    margin: 16px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .kunci-card h4:first-child { margin-top: 0; }
  .kunci-card p, .kunci-card li {
    font-size: 14.5px;
    color: var(--text2);
    line-height: 1.85;
    margin-bottom: 10px;
  }
  .kunci-card ul { padding-left: 20px; }
  .kunci-card strong { color: var(--text); font-weight: 700; }

  /* ── SCORE BANNER ── */
  .score-banner {
    display: none;
    margin-top: 18px;
    padding: 20px 24px;
    border-radius: var(--r2);
    border: 1px solid var(--border-h);
    background: var(--bg2);
    align-items: center;
    gap: 18px;
    box-shadow: var(--shadow-lg);
  }
  .score-banner.show { display: flex; }
  .score-big {
    font-family: var(--font-head);
    font-size: 40px;
    font-weight: 800;
    min-width: 88px;
    text-align: center;
    line-height: 1;
  }
  .score-big.great { color: var(--teal); }
  .score-big.ok    { color: var(--gold); }
  .score-big.poor  { color: var(--coral); }
  .score-meta { flex: 1; }
  .score-meta strong {
    display: block;
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .score-meta p { font-size: 13px; color: var(--text2); }
  .retry-btn {
    padding: 9px 20px;
    background: var(--accent-bg);
    border: 1.5px solid rgba(91,76,219,.25);
    border-radius: 8px;
    color: var(--accent);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .retry-btn:hover { background: rgba(91,76,219,.14); }

  /* ── DIVIDER ── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 20px;
  }
  .section-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-divider-text {
    font-family: var(--font-head);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text3);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── NAV BUTTONS ── */
  .part-nav {
    display: flex;

<p>Banyak perusahaan melakukan kesalahan fatal dengan membuat puluhan SOP dan puluhan alur kerja berbeda untuk setiap jenis permintaan.</p>

<p>Sistem efisien menggunakan <strong>SATU ALUR KERJA</strong> yang terhubung ke <em>Decision Matrix</em> (Tabel Pemetaan/Database Lookup) yang mengatur secara otomatis:</p>

<h3>2. Anatomi Peran Service Desk</h3>
<ul>
  <li><strong>Ticket Ownership:</strong> Service Desk adalah pemilik tiket dari awal (<em>cradle</em>) hingga ditutup (<em>grave</em>). Meskipun tiket sedang dilempar ke Tim L2/L3, Service Desk tetap memantau SLA.</li>
  <li><strong>The IT Shield (Tameng TI):</strong> Fungsi utama Service Desk adalah menyaring interupsi — para Engineer dan Programmer bisa fokus tanpa diganggu langsung oleh telepon pengguna.</li>
  <li><strong>Fondasi Karir Soft-Skill:</strong> Posisi ini melatih empati dan komunikasi tingkat tinggi — terjepit antara user yang marah dan teknisi yang stres. Lulusan berhasil sangat mudah bermigrasi menjadi System Analyst, QA, atau Manajer Proyek.</li>
</ul>

<h3>📚 Glosarium Istilah Teknis</h3>
<ol>
  <li><strong>SOP (Standard Operating Procedure):</strong> Dokumen tertulis yang membakukan tahapan yang harus dilalui untuk menyelesaikan suatu proses kerja.</li>
  <li><strong>Workflow Engine:</strong> Komponen perangkat lunak yang mengelola dan mengeksekusi alur kerja bisnis secara otomatis.</li>

<h3>2. Agen Investigasi (Level 1) vs Dispatcher Pasif</h3>
<p>Service Desk yang baik bukan sekadar Dispatcher (petugas penyalur tiket).</p>
<ul>
  <li><strong>Dispatcher Pasif:</strong> Hanya melihat judul tiket dan langsung melempar ke tim belakang — fungsinya bisa 100% digantikan robot routing (IVR/ACD).</li>
  <li><strong>Investigasi Awal (First Line Diagnosis):</strong> Agen wajib melakukan troubleshooting dasar ("Apakah sudah cek kabel LAN?", "Ada notifikasi error code di layar?"). Ini adalah filter (firewall) agar teknisi L2 menerima tiket dengan data teknis yang sudah matang dan valid.</li>
</ul>

<h3>3. Algoritma Timeboxing & First Contact Resolution (FCR)</h3>
<p><strong>Aturan emas antrian:</strong> Jangan biarkan Service Desk memegang tiket terlalu lama.</p>
<ul>
  <li>Service Desk dituntut mencapai <strong>First Contact Resolution (FCR)</strong> — menyelesaikan masalah saat pengguna pertama kali melapor.</li>
  <li><strong>Timeboxing:</strong> Penyelesaian dibatasi waktu (misal: <strong>15–30 menit</strong>). Jika dalam 15 menit gagal diselesaikan → <strong>Stop & Escalate</strong> ke Level 2.</li>
  <li><strong>Alasan Analitik:</strong> Jika satu agen memaksakan diri 2 jam untuk satu tiket rumit, ia akan mengabaikan 20+ panggilan masuk — Abandonment Rate meroket dan SLA perusahaan hancur.</li>
</ul>

<blockquote>
  <strong>[Tiket Masuk ke Service Desk]</strong><br>

  &nbsp;&nbsp;&nbsp;&nbsp;└── YES → Lakukan Investigasi Awal (Level 1 Diagnosis)<br>

        <span class="legend-dot"><span class="ld" style="background:#2a7ee8"></span> Tools</span>
        <span class="legend-dot"><span class="ld" style="background:#c47a00"></span> Metrik</span>
        <span class="legend-dot"><span class="ld" style="background:#e8404a"></span> Error/Defect</span>
        <span style="color:var(--text3);font-size:11.5px;margin-left:4px">← Klik untuk definisi</span>
      </div>

      <!-- ── MATERI ── -->
      <div class="section-label">
        <div class="section-label-icon materi">📖</div>
        <div>
          <h3>Materi Pembelajaran</h3>
          <p>Part ${state.partIdx + 1} — ${part.title}</p>
        </div>
      </div>
      <div class="material-card">${highlightTerms(part.material)}</div>

      <!-- ── SOAL ── -->
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <span class="section-divider-text">Soal Evaluasi Mandiri</span>
        <div class="section-divider-line"></div>
      </div>
      <div class="section-label">
        <div class="section-label-icon soal">✏️</div>
        <div>
          <h3>Evaluasi Pemahaman</h3>
          <p>Uji pemahaman Anda terhadap materi di atas</p>
        </div>
      </div>
      <div class="soal-section">
        <div class="soal-type-header">
          <span class="soal-type-badge pg">Pilihan Ganda</span>
          <span class="soal-type-title">Bagian A — Pilihan Ganda</span>
        </div>
        ${pgHtml}
        <div class="score-banner${allAnswered ? ' show' : ''}" id="score-banner">
          <div class="score-big ${scoreClass}">${correctCount}/${pgQuiz.length}</div>
          <div class="score-meta">
            <strong>${msgs[msgIdx]}</strong>
            <p>${correctCount} dari ${pgQuiz.length} pertanyaan dijawab benar</p>
          </div>
          <button class="retry-btn" onclick="retryQuiz()">↺ Coba Lagi</button>
        </div>
        ${esaiHtml}
      </div>

      <!-- ── KUNCI ── -->
      ${kunciHtml}

      <!-- ── NAV ── -->
      <div class="part-nav">
        ${prev ? `<button class="nav-btn" onclick="goTo(${prev.ci},${prev.pi})">← Sebelumnya</button>` : '<span></span>'}
        ${next ? `<button class="nav-btn primary" onclick="goToNext(${next.ci},${next.pi})">Berikutnya →</button>` : `<button class="nav-btn primary" onclick="goWelcome()">🎉 Selesai Semua!</button>`}
      </div>
    </div>
  `;

  // Attach term click listeners
  el.querySelectorAll('.term').forEach(span => {
    span.addEventListener('click', (e) => {
      e.stopPropagation();
      showTooltip(e, span.dataset.term);
    });
  });
}

function goToNext(ci, pi) {
  const key = `${state.catIdx}-${state.partIdx}`;
  state.completedParts[key] = true;
  goTo(ci, pi);
}

function goWelcome() {
  const key = `${state.catIdx}-${state.partIdx}`;
  state.completedParts[key] = true;
  state.view = 'welcome';
  renderAll();
}

function highlightTerms(html) {
  let result = html;
  result = result.replace(/data-term="([^"]+)"/g, (match, term) => {
    const info = GLOSSARY[term];
    const type = info ? info.type : 'concept';
    return `data-term="${term}" data-type="${type}"`;
  });
  return result;
}

// ═══════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════
function answerQuiz(qi, chosen) {
  const key = `${state.catIdx}-${state.partIdx}-${qi}`;
  if (state.quizAnswers[key] !== undefined) return;
  state.quizAnswers[key] = chosen;

  const cat = CATEGORIES[state.catIdx];
  const part = cat.parts[state.partIdx];
  const q = (part.soal && part.soal.pg) ? part.soal.pg[qi] : null;
  if (!q) return;
  const correct = chosen === q.answer;

  const card = document.getElementById(`qcard-${qi}`);
  card.classList.add('answered');
  card.querySelectorAll('.option-btn').forEach((btn, oi) => {
    btn.disabled = true;
    if (oi === q.answer) btn.classList.add('correct');
    else if (oi === chosen && !correct) btn.classList.add('wrong');
  });
  const fb = document.getElementById(`qfb-${qi}`);
  fb.classList.add('show', correct ? 'ok' : 'no');
  fb.textContent = (correct ? '✓ Benar! ' : '✗ Kurang tepat. ') + q.explain;

  const quizKey = `${state.catIdx}-${state.partIdx}`;
  const pgQuiz = (part.soal && part.soal.pg) ? part.soal.pg : [];
  const allAnswered = pgQuiz.length > 0 && pgQuiz.every((_, i) => state.quizAnswers[`${quizKey}-${i}`] !== undefined);
  if (allAnswered) {
    const correctCount = pgQuiz.filter((qq, i) => state.quizAnswers[`${quizKey}-${i}`] === qq.answer).length;
    const banner = document.getElementById('score-banner');
    if (banner) {
      banner.classList.add('show');
      const scoreClass = correctCount / pgQuiz.length >= 0.8 ? 'great' : correctCount / pgQuiz.length >= 0.5 ? 'ok' : 'poor';
      const msgs = ['Terus berlatih! Pelajari kembali materinya 💪', 'Lumayan! Beberapa konsep perlu didalami lagi 📖', 'Bagus sekali! Kamu paham materi ini dengan baik 🎉'];
      const msgIdx = correctCount / pgQuiz.length >= 0.8 ? 2 : correctCount / pgQuiz.length >= 0.5 ? 1 : 0;
      banner.querySelector('.score-big').className = `score-big ${scoreClass}`;
      banner.querySelector('.score-big').textContent = `${correctCount}/${pgQuiz.length}`;
      banner.querySelector('.score-meta strong').textContent = msgs[msgIdx];
      banner.querySelector('.score-meta p').textContent = `${correctCount} dari ${pgQuiz.length} pertanyaan dijawab benar`;
      if (correctCount === pgQuiz.length) {
        state.completedParts[`${state.catIdx}-${state.partIdx}`] = true;
        updateProgress();
        renderSidebar();
      }
    }
  }
}

function retryQuiz() {
  const quizKey = `${state.catIdx}-${state.partIdx}`;
  const part = CATEGORIES[state.catIdx].parts[state.partIdx];
  const pgQuiz = (part.soal && part.soal.pg) ? part.soal.pg : [];
  pgQuiz.forEach((_, qi) => {
    delete state.quizAnswers[`${quizKey}-${qi}`];
  });
  renderMain();
}

// ═══════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
let tooltipVisible = false;

function showTooltip(e, term) {
  const info = GLOSSARY[term];
  if (!info) return;
  const typeLabels = { concept: 'Konsep', process: 'Proses', tool: 'Tool', metric: 'Metrik', error: 'Error/Defect' };
  document.getElementById('tt-type').textContent = typeLabels[info.type] || 'Konsep';
  document.getElementById('tt-type').className = `tooltip-label ${info.type}`;
  document.getElementById('tt-term').textContent = term;
  document.getElementById('tt-def').textContent = info.def;

  const rect = e.target.getBoundingClientRect();
  let top = rect.bottom + 10;
  let left = rect.left;
  const tw = 300;
  if (left + tw > window.innerWidth - 16) left = window.innerWidth - tw - 16;
  if (top + 160 > window.innerHeight) top = rect.top - 170;
  tooltip.style.top = top + 'px';
  tooltip.style.left = left + 'px';
  tooltip.classList.add('show');
  tooltipVisible = true;
}

document.addEventListener('click', (e) => {
  if (tooltipVisible && !e.target.classList.contains('term')) {
    tooltip.classList.remove('show');
    tooltipVisible = false;
  }
});

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress() {
  const total = CATEGORIES.reduce((s, c) => s + c.parts.length, 0);
  const done = Object.keys(state.completedParts).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = pct + '%';
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
renderAll();
</script>
</body>
</html>
